<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản trị - Nbreak Admin</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="icon" type="image/jpg" href="image/logo.jpg" />
    <style>
      .admin-container {
        max-width: 1400px;
        margin: 20px auto;
        padding: 0 20px;
        display: flex;
        gap: 25px;
      }
      .admin-sidebar {
        width: 280px;
        background: #4b2e2b;
        border-radius: 16px;
        padding: 20px;
        color: white;
        height: fit-content;
        position: sticky;
        top: 90px;
      }
      .admin-logo {
        text-align: center;
        padding-bottom: 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        margin-bottom: 20px;
      }
      .admin-logo i {
        font-size: 50px;
        color: #c8a27c;
      }
      .admin-logo h2 {
        margin: 10px 0 0;
        font-size: 20px;
      }
      .admin-menu {
        list-style: none;
        padding: 0;
      }
      .admin-menu li {
        margin-bottom: 10px;
      }
      .admin-menu a {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 15px;
        color: white;
        text-decoration: none;
        border-radius: 10px;
        transition: 0.3s;
      }
      .admin-menu a:hover,
      .admin-menu a.active {
        background: #c8a27c;
        color: #4b2e2b;
      }
      .admin-menu a i {
        width: 22px;
      }
      .admin-content {
        flex: 1;
        background: white;
        border-radius: 16px;
        padding: 25px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }
      .admin-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
        padding-bottom: 15px;
        border-bottom: 2px solid #eee;
      }
      .admin-header h1 {
        color: #4b2e2b;
        font-size: 24px;
      }
      .admin-stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        margin-bottom: 30px;
      }
      .stat-card {
        background: linear-gradient(135deg, #4b2e2b, #6f4e37);
        color: white;
        padding: 20px;
        border-radius: 16px;
        text-align: center;
      }
      .stat-card i {
        font-size: 35px;
        margin-bottom: 10px;
      }
      .stat-card .number {
        font-size: 28px;
        font-weight: bold;
      }
      .stat-card .label {
        font-size: 14px;
        opacity: 0.9;
      }
      .orders-table {
        width: 100%;
        border-collapse: collapse;
      }
      .orders-table th,
      .orders-table td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid #eee;
      }
      .orders-table th {
        background: #f5f5f5;
        color: #4b2e2b;
      }
      .orders-table tr:hover {
        background: #f9f9f9;
      }
      .status {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
      }
      .status-pending {
        background: #fff3cd;
        color: #856404;
      }
      .status-shipping {
        background: #cfe2ff;
        color: #084298;
      }
      .status-completed {
        background: #d1e7dd;
        color: #0f5132;
      }
      .btn-update {
        background: #4b2e2b;
        color: white;
        border: none;
        padding: 5px 12px;
        border-radius: 8px;
        cursor: pointer;
        margin: 0 3px;
      }
      .btn-update:hover {
        background: #6f4e37;
      }
      .login-required {
        text-align: center;
        padding: 60px;
        color: #999;
      }
      @media (max-width: 900px) {
        .admin-container {
          flex-direction: column;
        }
        .admin-sidebar {
          width: 100%;
          position: static;
        }
        .admin-stats {
          grid-template-columns: repeat(2, 1fr);
        }
        .orders-table {
          font-size: 12px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-khung">
        <a href="trang_chu.html" class="logo">
          <img src="image/logo.jpg" alt="Logo Nbreak" class="logo-vong" />
          <div class="logo-text">Nbreak Admin</div>
        </a>
        <div class="nut-dieu-huong">
          <a href="trang_chu.html" class="nav-item-box">
            <i class="fa-solid fa-house nav-icon"></i>
            <span class="nav-text">Trang chủ</span>
          </a>
          <div
            class="nav-item-box"
            id="account-btn"
            onclick="toggleAccountMenu()"
          >
            <i class="fa-solid fa-user nav-icon"></i>
            <span class="nav-text" id="account-text">Tài khoản</span>
          </div>
        </div>
      </div>
    </header>

    <div id="admin-content" class="admin-container">
      <!-- Nội dung sẽ load bằng JS -->
    </div>

    <footer style="margin-top: 40px">
      <div class="footer-container">
        <div class="footer-left">
          <h3>☕ Nbreak Admin</h3>
          <p>Hệ thống quản trị</p>
        </div>
        <div class="footer-contact">
          <h4>Liên hệ</h4>
          <p>
            📧 Email: <a href="mailto:admin@nbreak.com">admin@nbreak.com</a>
          </p>
          <p>☎️ Điện thoại: 0123 456 789</p>
        </div>
      </div>
      <div class="footer-bottom">
        <p><b>© 2026 Nbreak | Hệ thống quản trị</b></p>
      </div>
    </footer>

    <div id="account-dropdown" class="account-dropdown">
      <div class="account-header">
        <i class="fa-solid fa-circle-user"></i>
        <div>
          <div id="dropdown-username">Khách hàng</div>
          <div id="dropdown-email">Chưa đăng nhập</div>
        </div>
      </div>
      <div class="dropdown-divider"></div>
      <a href="javascript:void(0)" onclick="logout()"
        ><i class="fa-solid fa-right-from-bracket"></i> Đăng xuất</a
      >
    </div>

    <div
      id="toast-container"
      style="position: fixed; top: 20px; right: 20px; z-index: 10000"
    ></div>

    <script src="js/account.js"></script>
    <script>
      let currentUser = JSON.parse(localStorage.getItem("currentUser")) || null;
      let allOrders = JSON.parse(localStorage.getItem("orderHistory")) || [];
      let allUsers = JSON.parse(localStorage.getItem("users")) || [];

      function checkAdminAccess() {
        const container = document.getElementById("admin-content");
        if (!currentUser || currentUser.role !== "admin") {
          container.innerHTML = `
          <div class="login-required">
            <i class="fa-solid fa-lock" style="font-size: 60px; color: #ccc;"></i>
            <h2>🔐 Yêu cầu đăng nhập</h2>
            <p>Bạn cần đăng nhập bằng tài khoản Quản trị viên để truy cập trang này.</p>
            <a href="trang_chu.html" class="back-link" style="display: inline-block; margin-top: 20px;">← Về trang chủ</a>
          </div>
        `;
          return false;
        }
        return true;
      }

      function renderAdminDashboard() {
        if (!checkAdminAccess()) return;

        const totalOrders = allOrders.length;
        const totalRevenue = allOrders.reduce(
          (sum, o) => sum + (o.total || 0),
          0,
        );
        const pendingOrders = allOrders.filter(
          (o) => o.status === "pending",
        ).length;
        const totalCustomers = [
          ...new Set(allOrders.map((o) => o.userEmail).filter((e) => e)),
        ].length;

        const container = document.getElementById("admin-content");
        container.innerHTML = `
        <div class="admin-sidebar">
          <div class="admin-logo">
            <i class="fa-solid fa-shield-haltered"></i>
            <h2>Admin Panel</h2>
          </div>
          <ul class="admin-menu">
            <li><a href="javascript:void(0)" onclick="showTab('dashboard')" class="active" id="tab-dashboard"><i class="fa-solid fa-chart-line"></i> Tổng quan</a></li>
            <li><a href="javascript:void(0)" onclick="showTab('orders')" id="tab-orders"><i class="fa-solid fa-truck"></i> Đơn hàng</a></li>
            <li><a href="javascript:void(0)" onclick="showTab('customers')" id="tab-customers"><i class="fa-solid fa-users"></i> Khách hàng</a></li>
            <li><a href="javascript:void(0)" onclick="showTab('products')" id="tab-products"><i class="fa-solid fa-mug-hot"></i> Sản phẩm</a></li>
          </ul>
        </div>
        <div class="admin-content" id="admin-tab-content">
          <!-- Nội dung từng tab -->
        </div>
      `;

        showTab("dashboard");
      }

      function showTab(tabName) {
        // Cập nhật active menu
        document
          .querySelectorAll(".admin-menu a")
          .forEach((a) => a.classList.remove("active"));
        document.getElementById(`tab-${tabName}`).classList.add("active");

        const contentDiv = document.getElementById("admin-tab-content");

        if (tabName === "dashboard") {
          const totalOrders = allOrders.length;
          const totalRevenue = allOrders.reduce(
            (sum, o) => sum + (o.total || 0),
            0,
          );
          const pendingOrders = allOrders.filter(
            (o) => o.status === "pending",
          ).length;
          const completedOrders = allOrders.filter(
            (o) => o.status === "completed",
          ).length;
          const totalCustomers = [
            ...new Set(allOrders.map((o) => o.userEmail).filter((e) => e)),
          ].length;

          contentDiv.innerHTML = `
          <div class="admin-header">
            <h1>📊 Tổng quan</h1>
            <span>Xin chào, ${currentUser.name}</span>
          </div>
          <div class="admin-stats">
            <div class="stat-card"><i class="fa-solid fa-receipt"></i><div class="number">${totalOrders}</div><div class="label">Tổng đơn hàng</div></div>
            <div class="stat-card"><i class="fa-solid fa-clock"></i><div class="number">${pendingOrders}</div><div class="label">Đang xử lý</div></div>
            <div class="stat-card"><i class="fa-solid fa-check-circle"></i><div class="number">${completedOrders}</div><div class="label">Hoàn thành</div></div>
            <div class="stat-card"><i class="fa-solid fa-users"></i><div class="number">${totalCustomers}</div><div class="label">Khách hàng</div></div>
          </div>
          <div class="admin-stats">
            <div class="stat-card"><i class="fa-solid fa-money-bill-wave"></i><div class="number">${totalRevenue.toLocaleString()}đ</div><div class="label">Doanh thu</div></div>
          </div>
        `;
        } else if (tabName === "orders") {
          contentDiv.innerHTML = `
          <div class="admin-header"><h1>📦 Quản lý đơn hàng</h1><span>${allOrders.length} đơn hàng</span></div>
          <table class="orders-table">
            <thead><tr><th>Mã đơn</th><th>Ngày đặt</th><th>Khách hàng</th><th>Tổng tiền</th><th>Trạng thái</th><th>Thao tác</th></tr></thead>
            <tbody>
              ${allOrders
                .map(
                  (order) => `
                <tr>
                  <td>#${order.id}</td>
                  <td>${order.date || "Chưa rõ"}</td>
                  <td>${order.customer?.name || "Khách"}</td>
                  <td>${(order.total || 0).toLocaleString()}đ</td>
                  <td><span class="status status-${order.status || "pending"}">${getStatusText(order.status)}</span></td>
                  <td>
                    <button class="btn-update" onclick="viewOrderDetail('${order.id}')">Xem</button>
                    <select onchange="updateOrderStatus('${order.id}', this.value)" style="padding:5px; border-radius:8px;">
                      <option value="pending" ${order.status === "pending" ? "selected" : ""}>Đang xử lý</option>
                      <option value="shipping" ${order.status === "shipping" ? "selected" : ""}>Đang giao</option>
                      <option value="completed" ${order.status === "completed" ? "selected" : ""}>Hoàn thành</option>
                      <option value="cancelled" ${order.status === "cancelled" ? "selected" : ""}>Đã hủy</option>
                    </select>
                  </td>
                </tr>
              `,
                )
                .join("")}
            </tbody>
          </table>
        `;
        } else if (tabName === "customers") {
          const customerMap = new Map();
          allOrders.forEach((order) => {
            if (order.userEmail) {
              if (!customerMap.has(order.userEmail)) {
                customerMap.set(order.userEmail, {
                  email: order.userEmail,
                  name: order.customer?.name,
                  orders: 0,
                  total: 0,
                });
              }
              const c = customerMap.get(order.userEmail);
              c.orders++;
              c.total += order.total || 0;
            }
          });
          const customers = Array.from(customerMap.values());

          contentDiv.innerHTML = `
          <div class="admin-header"><h1>👥 Khách hàng</h1><span>${customers.length} khách hàng</span></div>
          <table class="orders-table">
            <thead><tr><th>Email</th><th>Tên khách hàng</th><th>Số đơn hàng</th><th>Tổng chi tiêu</th></tr></thead>
            <tbody>
              ${customers
                .map(
                  (c) => `
                <tr><td>${c.email}</td><td>${c.name || "Chưa cập nhật"}</td><td>${c.orders}</td><td>${c.total.toLocaleString()}đ</td></tr>
              `,
                )
                .join("")}
            </tbody>
          </table>
        `;
        } else if (tabName === "products") {
          // Thống kê sản phẩm bán chạy
          const productStats = new Map();
          allOrders.forEach((order) => {
            if (order.items) {
              order.items.forEach((item) => {
                if (!productStats.has(item.name)) {
                  productStats.set(item.name, {
                    name: item.name,
                    quantity: 0,
                    revenue: 0,
                  });
                }
                const p = productStats.get(item.name);
                p.quantity += item.quantity;
                p.revenue += item.price * item.quantity;
              });
            }
          });
          const topProducts = Array.from(productStats.values())
            .sort((a, b) => b.quantity - a.quantity)
            .slice(0, 10);

          contentDiv.innerHTML = `
          <div class="admin-header"><h1>☕ Sản phẩm bán chạy</h1><span>Top 10 sản phẩm</span></div>
          <table class="orders-table">
            <thead><tr><th>Sản phẩm</th><th>Số lượng bán</th><th>Doanh thu</th></tr></thead>
            <tbody>
              ${topProducts
                .map(
                  (p) => `
                <tr><td>${p.name}</td><td>${p.quantity}</td><td>${p.revenue.toLocaleString()}đ</td></tr>
              `,
                )
                .join("")}
            </tbody>
          </table>
        `;
        }
      }

      function getStatusText(status) {
        const statusMap = {
          pending: "🟡 Đang xử lý",
          shipping: "📦 Đang giao",
          completed: "✅ Hoàn thành",
          cancelled: "❌ Đã hủy",
        };
        return statusMap[status] || "🟡 Đang xử lý";
      }

      function viewOrderDetail(orderId) {
        const order = allOrders.find((o) => o.id === orderId);
        if (!order) return;
        let itemsHtml = "";
        if (order.items) {
          order.items.forEach((item) => {
            itemsHtml += `${item.name} x ${item.quantity} = ${(item.price * item.quantity).toLocaleString()}đ\n`;
          });
        }
        alert(
          `📋 ĐƠN HÀNG #${order.id}\n👤 Khách: ${order.customer?.name}\n📞 SĐT: ${order.customer?.phone}\n🏠 Địa chỉ: ${order.customer?.address}\n\n🛒 Sản phẩm:\n${itemsHtml}\n💰 Tổng: ${(order.total || 0).toLocaleString()}đ`,
        );
      }

      function updateOrderStatus(orderId, newStatus) {
        const order = allOrders.find((o) => o.id === orderId);
        if (order) {
          order.status = newStatus;
          localStorage.setItem("orderHistory", JSON.stringify(allOrders));
          showToast(
            `✅ Đã cập nhật trạng thái đơn hàng #${orderId} thành ${getStatusText(newStatus)}`,
          );
          showTab("orders");
        }
      }

      function showToast(msg) {
        let container = document.getElementById("toast-container");
        if (!container) {
          container = document.createElement("div");
          container.id = "toast-container";
          container.style.cssText =
            "position:fixed;top:100px;right:20px;z-index:10000;";
          document.body.appendChild(container);
        }
        const toast = document.createElement("div");
        toast.style.cssText =
          "background:#10b981; color:white; padding:12px 20px; border-radius:8px; margin-top:5px;";
        toast.innerText = msg;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
      }

      document.addEventListener("DOMContentLoaded", () => {
        renderAdminDashboard();
      });
    </script>
  </body>
</html>
